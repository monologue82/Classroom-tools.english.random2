<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>八年级下册 完成句子 随机抽题</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            background-color: #e6f7f9;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
            position: relative;
            overflow-x: hidden;
        }
        
        .cf-turnstile-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fafafa;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
        }
        
        .main-content.hidden {
            display: none;
        }

        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(102, 217, 232, 0.15);
            z-index: 0;
            transition: all 0.4s ease;
        }
        body::before {
            width: 350px;
            height: 350px;
            top: 10%;
            left: -100px;
        }
        body::after {
            width: 280px;
            height: 280px;
            bottom: 15%;
            right: -80px;
        }
        .bg-shape {
            position: absolute;
            background: rgba(102, 217, 232, 0.1);
            z-index: 0;
            transition: all 0.5s ease;
        }
        .shape1 {
            width: 140px;
            height: 140px;
            border-radius: 20px;
            top: 25%;
            right: 12%;
            transform: rotate(25deg);
        }
        .shape2 {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            bottom: 30%;
            left: 10%;
            transform: rotate(-15deg);
        }

        .container {
            width: 95%;
            max-width: 1600px;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 30px rgba(0, 179, 210, 0.08);
            animation: containerFade 0.6s ease forwards;
            opacity: 0;
            position: relative;
            z-index: 1;
        }

        @keyframes containerFade {
            to { opacity: 1; transform: translateY(0); }
            from { opacity: 0; transform: translateY(20px); }
        }

        .title {
            text-align: center;
            font-size: 34px;
            color: #0d6b78;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .control-panel {
            background: #f2fcfd;
            padding: 22px;
            border-radius: 14px;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease 0.2s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .unit-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 24px;
            font-size: 17px;
            border: 2px solid #26c6da;
            background: white;
            color: #0097a7;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.2);
            transition: left 0.3s ease;
        }

        .tab-btn:hover::after {
            left: 100%;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: #26c6da;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(38,198,218,0.2);
        }

        .setting {
            text-align: center;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .setting input {
            width: 70px;
            padding: 8px;
            font-size: 16px;
            text-align: center;
            border: 1px solid #b2ebf2;
            border-radius: 6px;
            outline: none;
            transition: all 0.2s;
        }

        .setting input:focus {
            border-color: #26c6da;
            box-shadow: 0 0 0 2px rgba(38,198,218,0.2);
            transform: scale(1.03);
        }

        .answer-switch {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .question-box {
            background-color: #f2fcfd;
            padding: 30px;
            border-radius: 12px;
            min-height: 180px;
            font-size: 19px;
            color: #0d6b78;
            margin-bottom: 30px;
            line-height: 1.9;
            white-space: pre-line;
            border: 1px solid #d1f1f5;
            animation: boxPop 0.5s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes boxPop {
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .random-btn, .reset-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 40px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .random-btn {
            background-color: #00bcd4;
            color: white;
            box-shadow: 0 4px 12px rgba(0,188,212,0.2);
        }

        .reset-btn {
            background-color: #95a5a6;
            color: white;
            box-shadow: 0 4px 12px rgba(149,165,166,0.15);
        }

        .random-btn::before, .reset-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
        }

        .random-btn:active::before, .reset-btn:active::before {
            width: 400px;
            height: 400px;
        }

        .random-btn:hover {
            background-color: #00acc1;
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,188,212,0.25);
        }

        .reset-btn:hover {
            background-color: #7f8c8d;
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(149,165,166,0.2);
        }

        .random-btn:active, .reset-btn:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #546e7a;
            font-size: 15px;
        }

        .answer {
            color: #e74c3c;
            font-weight: bold;
        }

        .question-item {
            background: #e0f7fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 12px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .question-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .question-item:hover::before {
            left: 100%;
        }

        .question-item:hover {
            background: #b2ebf2;
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 3px 8px rgba(0,0,0,0.06);
        }
    </style>
</head>

<body>
    <div id="cf-turnstile-wrapper" class="cf-turnstile-container">
        <div class="cf-turnstile" data-sitekey="0x4AAAAAADIqAuHMoQzLsZOVarVcqa9qJ-4" data-callback="onTurnstileSuccess"></div>
    </div>
    
    <div class="main-content hidden">
        <div class="bg-shape shape1"></div>
        <div class="bg-shape shape2"></div>

        <div class="container">
        <div class="title">八年级下册 Unit1-3 完成句子 随机抽题</div>

        <div class="control-panel">
            <div class="unit-tabs">
                <button class="tab-btn active" data-unit="all">全部单元</button>
                <button class="tab-btn" data-unit="unit1">Unit1</button>
                <button class="tab-btn" data-unit="unit2">Unit2</button>
                <button class="tab-btn" data-unit="unit3">Unit3</button>
            </div>

            <div class="setting">
                <div>随机抽取：<input type="number" id="count" min="1" value="5" max="20"> 题</div>
                <div class="answer-switch">
                    <input type="checkbox" id="showAnswer">
                    <label for="showAnswer">显示答案</label>
                </div>
            </div>
        </div>

        <div class="question-box" id="questionBox">点击「随机抽题」开始出题</div>

        <div class="btn-group">
            <button class="random-btn" id="randomBtn">
                <i class="fa-solid fa-shuffle"></i> 随机抽题
            </button>
            <button class="reset-btn" id="resetBtn">
                <i class="fa-solid fa-refresh"></i> 清空重置
            </button>
        </div>

        <div class="footer">八年级英语 课堂抽题工具</div>
    </div>

    <script>
        // Cloudflare Turnstile验证成功回调
        function onTurnstileSuccess(token) {
            document.getElementById('cf-turnstile-wrapper').style.display = 'none';
            document.querySelector('.main-content').classList.remove('hidden');
        }

        const questions = {
            unit1: [
                { q: "设个闹钟提醒自己早点睡觉是个好习惯。It's a good habit to set an alarm to ______ go to bed early.", a: "remind yourself to" },
                { q: "很少有人有足够的勇气去挑战旧规则并提出新想法。Few people ______ the old rules and suggest new ideas.", a: "have the courage to challenge" },
                { q: "我们应该学会勇敢面对挑战，而不是逃避。We should learn to ______ bravely ______ running away from them.", a: "face challenges; instead of" },
                { q: "你骑自行车时戴头盔，这样做很明智。It's ______ wear a helmet when riding a bicycle.", a: "wise of you to" },
                { q: "所有学生从周一到周五都被要求穿校服。All students ______ from Monday to Friday.", a: "are required to wear school uniforms" },
                { q: "学校为所有学生提供免费午餐。The school ______ free lunch ______ all students.", a: "provides; for" },
                { q: "这道数学题超出了我的能力范围；我需要向老师求助。This math problem is ______; I need to ask the teacher for help.", a: "beyond my ability" },
                { q: "据说在不久的将来，现金将被移动支付取代。It is said that cash ______ mobile payments in the near future.", a: "will be replaced by" },
                { q: "有不同爱好的学生可以通过分享想法从彼此身上受益。Students with different hobbies can ______ by sharing ideas.", a: "benefit from each other" },
                { q: "我不知道该怎么办。如果我父母不同意我的决定呢？I don't know ______. What if my parents disagree with my decision?", a: "what to do" },
                { q: "老师提醒学生们要按时交作业。The teacher ______ the students ______ their homework on time.", a: "reminded; to hand in" },
                { q: "那首老歌总是让我想起我快乐的童年。That old song always ______ my happy childhood.", a: "reminds me of" },
                { q: "这项任务需要我们作为一个团队共同努力。This task ______ work together as a team.", a: "requires us to" },
                { q: "我们有必要通过遵守科学实验室的安全规则来避免事故。______ avoid accidents ______ the safety rules in the science lab.", a: "It's necessary for us to; by following" },
                { q: "他后悔上学期没有为期末考试更努力地学习。He ______ harder for the final exam last term.", a: "regretted not studying" },
                { q: "多亏了科技，智能家居已不再是梦想，而是现实。______ technology, smart homes are no longer a dream but ______.", a: "Thanks to; a reality" },
                { q: "她尽最大努力在数学上跟上同班同学。She tries her best to ______ her classmates in math.", a: "keep up with" },
                { q: "选择合适的职业对每个人来说都是一个重要的决定。______ is an important decision for everyone.", a: "Choosing the right career" },
                { q: "离家前，你应该确保门是锁好的。Before leaving home, you should ______ the door ______.", a: "make sure; is locked" },
                { q: "毕业后，他期望找到一份计算机科学领域的工作。After graduation, he ______ a job in computer science.", a: "expects to find" }
            ],
            unit2: [
                { q: "但很快，我爱上了这项运动。But soon, I ______ the sport.", a: "fell in love with" },
                { q: "儿子气喘吁吁地跑进门。The son ______ the door, ______.", a: "ran into; out of breath" },
                { q: "他对他儿子的行为感到失望。He was ______ his son's behaviour.", a: "disappointed at" },
                { q: "他说话声音低。要听清楚他说的话太难了。He speaks ______. It's too hard to hear him clearly.", a: "in a low voice" },
                { q: "只要我们继续努力，就能克服任何困难。______ we keep trying, we can ______ any difficulty.", a: "As long as; overcome" },
                { q: "他未能按时到达车站。He ______ at the station on time.", a: "failed to arrive" },
                { q: "在回去的路上Judy遇到了她老师。______ Judy met her teacher.", a: "On the way back" },
                { q: "你昨晚为什么晚归了？Why did you ______ last night?", a: "return late" },
                { q: "Paul理解我的观点，但他不同意我的意见。Paul understands ______ but he disagrees with me.", a: "my opinion" },
                { q: "如果你努力，你就会为自己的进步感到骄傲。If you work hard, you'll ______ your progress.", a: "be proud of" },
                { q: "我能和我的新同学友好相处。______", a: "I can get on well with my new classmates" },
                { q: "我肯定Sally会从错误中吸取教训的。I'm sure Sally will ______ mistakes.", a: "learn from" },
                { q: "散步能让他暂时忘记学校的压力。Going for a walk ______ school stress.", a: "makes him forget" },
                { q: "Eric下周要参加学校话剧的试演。Eric will ______ the school play next week.", a: "try out for" },
                { q: "女孩们迫不及待想开始派对！Girls ______ the party!", a: "can't wait to start" },
                { q: "老师送我弟弟回家了，因为他感到不舒服。The teacher ______ because he felt sick.", a: "sent my brother home" },
                { q: "老师进来时，教室里突然鸦雀无声。A sudden silence ______ the classroom when the teacher entered.", a: "fell over" },
                { q: "Blake了解到吃健康食物的重要性。Blake learnt about ______ eating healthy food.", a: "the importance of" },
                { q: "Kelly感到很难过，因为她的朋友们吃午餐时没有叫她。Kelly felt sad because her friends ______ at lunch.", a: "didn't invite her" },
                { q: "Sam的书包和我的不同。Sam's schoolbag ______ mine.", a: "is different from" }
            ],
            unit3: [
                { q: "这款手机的价格比那款低得多。The price of this phone is ______ that one.", a: "much lower than" },
                { q: "我十岁时，父母建议我为将来存一些钱。My parents ______ some money for the future when I was ten.", a: "advised me to save" },
                { q: "在昨天的课上，老师建议每天早上大声朗读。The teacher ______ every morning in yesterday's class.", a: "suggested reading aloud" },
                { q: "我决定听取他的建议，加入了篮球队。I decided to ______ and join the basketball team.", a: "take his advice" },
                { q: "听到这个坏消息后，他沉默地站在那里很久。After hearing the bad news, he stood there ______ for a long time.", a: "in silence" },
                { q: "她毫不费力地回答了所有问题。She answered all the questions ______.", a: "without difficulty" },
                { q: "你不会通过考试，除非你尽一切努力去学习。You won't pass the exam ______ you ______ to study.", a: "unless; make every effort" },
                { q: "考试前你不应该熬夜。You ______ before an exam.", a: "shouldn't stay up late" },
                { q: "你最好不要花太多时间在手机上。它对你的眼睛有害。You ______ too much time on your phone. It's bad for your eyes.", a: "had better not spend" },
                { q: "我不知道如何应对这种情况。I don't know how to ______ this situation.", a: "deal with" },
                { q: "父母在孩子的教育中起着关键作用。Parents ______ their children's education.", a: "play a key role in" },
                { q: "志愿者们愿意帮助社区里的老人。The volunteers ______ help the old people in the community.", a: "are willing to" },
                { q: "她因为这个笑话生气了，气冲冲地回到了自己的房间。She got angry at the joke and ______ to her room.", a: "went angrily" },
                { q: "如果我赶不上最后一班公交车怎么办？我只好打车了。______ I fail to catch the last bus? I'll have to take a taxi.", a: "What if" },
                { q: "你打碎了窗户，所以你必须为自己的行为承担责任。You broke the window, so you must ______ your action.", a: "be responsible for" },
                { q: "面试工作时，你应该坦白你的优缺点。In the job interview, you should be honest about your ______.", a: "strengths and weaknesses" },
                { q: "她一点一点地攒钱，直到能买一辆新自行车。She saved money ______ until she could buy a new bicycle.", a: "bit by bit" },
                { q: "对许多贫困家庭来说，优质教育似乎遥不可及。For many poor families, a good education seems ______.", a: "far away" },
                { q: "在困难时期我们应该互相帮助。We should help each other ______ difficulty.", a: "in times of" },
                { q: "粉丝们来到体育场为他们最喜欢的歌手欢呼。The fans came to the stadium to ______ their favourite singer.", a: "cheer for" }
            ]
        };

        questions.all = [...questions.unit1, ...questions.unit2, ...questions.unit3];

        const tabBtns = document.querySelectorAll('.tab-btn');
        const questionBox = document.getElementById('questionBox');
        const randomBtn = document.getElementById('randomBtn');
        const resetBtn = document.getElementById('resetBtn');
        const countInput = document.getElementById('count');
        const showAnswer = document.getElementById('showAnswer');
        let currentUnit = 'all';

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentUnit = btn.dataset.unit;
                questionBox.innerHTML = '点击「随机抽题」开始出题';
            });
        });

        randomBtn.addEventListener('click', () => {
            const list = questions[currentUnit];
            let need = parseInt(countInput.value) || 5;
            need = Math.max(1, Math.min(need, list.length));
            
            const copy = [...list];
            const res = [];
            for (let i = 0; i < need; i++) {
                const idx = Math.floor(Math.random() * copy.length);
                const item = copy.splice(idx, 1)[0];
                let line = `<div class="question-item">${i+1}. ${item.q}`;
                if (showAnswer.checked) {
                    line += `<br><span class="answer">→ ${item.a}</span>`;
                }
                line += `</div>`;
                res.push(line);
            }
            questionBox.innerHTML = res.join('');
        });

        resetBtn.addEventListener('click', () => {
            questionBox.innerHTML = '点击「随机抽题」开始出题';
        });
    </script>
    </div>
</body>
</html>
